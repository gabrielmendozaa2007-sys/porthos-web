<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Porthos · Steakhouse &amp; Pub</title>
<style>
  :root{
    --charcoal:#1b1b18;
    --charcoal-soft:#20211f;
    --green:#6e7b3c;
    --green-dark:#5b6731;
    --cream:#eae6d3;
    --panel:#f4f1e6;
    --bot-bubble:#ece8d8;
    --ink:#26261f;
    --shadow:0 18px 50px rgba(0,0,0,.38);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--charcoal);
    color:var(--cream);
  }

  /* ---------- Launcher ---------- */
  #porthos-launcher{
    position:fixed; right:26px; bottom:26px; z-index:9999;
    width:66px; height:66px; border-radius:50%;
    border:2px solid var(--green);
    background:var(--charcoal-soft) center/86% no-repeat;
    background-image:url("porthos-mark.png");
    cursor:pointer; box-shadow:var(--shadow);
    transition:transform .18s ease, box-shadow .18s ease;
    -webkit-tap-highlight-color:transparent;
  }
  #porthos-launcher:hover{ transform:scale(1.06); box-shadow:0 20px 55px rgba(0,0,0,.5) }
  #porthos-launcher::after{
    content:""; position:absolute; inset:-2px; border-radius:50%;
    box-shadow:0 0 0 0 rgba(110,123,60,.55);
    animation:porthos-pulse 2.6s infinite;
  }
  @keyframes porthos-pulse{
    0%{box-shadow:0 0 0 0 rgba(110,123,60,.5)}
    70%{box-shadow:0 0 0 16px rgba(110,123,60,0)}
    100%{box-shadow:0 0 0 0 rgba(110,123,60,0)}
  }
  #porthos-launcher.open::after{animation:none}

  /* ---------- Chat window ---------- */
  #porthos-chat{
    position:fixed; right:26px; bottom:104px; z-index:9999;
    width:380px; max-width:calc(100vw - 36px);
    height:564px; max-height:calc(100vh - 130px);
    background:var(--panel); border-radius:20px; overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow:var(--shadow);
    opacity:0; transform:translateY(16px) scale(.98); pointer-events:none;
    transition:opacity .22s ease, transform .22s ease;
  }
  #porthos-chat.open{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto }

  .pc-header{
    background:var(--charcoal); color:var(--cream);
    padding:14px 16px; display:flex; align-items:center; gap:12px;
    border-bottom:2px solid var(--green);
  }
  .pc-header .logo{
    width:42px; height:42px; border-radius:50%;
    background:var(--charcoal-soft) center/84% no-repeat;
    background-image:url("porthos-mark.png");
    border:1.5px solid var(--green); flex:0 0 auto;
  }
  .pc-header .titles{flex:1; line-height:1.15}
  .pc-header .titles .t{font-size:16px; font-weight:700; letter-spacing:.5px}
  .pc-header .titles .s{font-size:11px; color:var(--green); letter-spacing:2px; text-transform:uppercase}
  .pc-header .status{font-size:11px; color:#b9c089; display:flex; align-items:center; gap:5px; margin-top:2px}
  .pc-header .status .dot{width:7px;height:7px;border-radius:50%;background:#8aa04a;box-shadow:0 0 0 3px rgba(138,160,74,.25)}
  .pc-close{
    background:transparent; border:0; color:var(--cream); font-size:22px;
    cursor:pointer; opacity:.75; padding:4px 6px; line-height:1; border-radius:8px;
  }
  .pc-close:hover{opacity:1; background:rgba(255,255,255,.08)}

  .pc-body{flex:1; overflow-y:auto; padding:18px 14px; display:flex; flex-direction:column; gap:10px}
  .pc-body::-webkit-scrollbar{width:8px}
  .pc-body::-webkit-scrollbar-thumb{background:#d8d2bd; border-radius:8px}

  .msg{max-width:80%; padding:10px 13px; border-radius:14px; font-size:14px; line-height:1.45; white-space:pre-wrap; word-wrap:break-word; animation:rise .2s ease}
  @keyframes rise{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
  .msg.bot{align-self:flex-start; background:var(--bot-bubble); color:var(--ink); border-bottom-left-radius:4px}
  .msg.user{align-self:flex-end; background:var(--green); color:#f6f3e7; border-bottom-right-radius:4px}

  .typing{align-self:flex-start; background:var(--bot-bubble); padding:12px 14px; border-radius:14px; border-bottom-left-radius:4px; display:none}
  .typing.show{display:flex; gap:4px}
  .typing span{width:7px;height:7px;border-radius:50%;background:#9a9580;animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

  .pc-input{display:flex; align-items:flex-end; gap:8px; padding:10px 12px; background:#fff; border-top:1px solid #e2dcc8}
  .pc-input textarea{
    flex:1; resize:none; border:1px solid #ddd6c2; border-radius:12px;
    padding:10px 12px; font-size:14px; font-family:inherit; max-height:96px; outline:none; color:var(--ink);
    overflow-y:auto;
  }
  .pc-input textarea::-webkit-scrollbar{width:0;height:0}
  .pc-input textarea:focus{border-color:var(--green)}
  .pc-send{
    flex:0 0 auto; width:42px; height:42px; border-radius:50%; border:0;
    background:var(--green); color:#f6f3e7; cursor:pointer; font-size:18px;
    display:flex; align-items:center; justify-content:center; transition:background .15s;
  }
  .pc-send:hover{background:var(--green-dark)}
  .pc-send:disabled{opacity:.5; cursor:default}
  .pc-foot{text-align:center; font-size:10px; color:#a39f8c; padding:6px 0 9px; background:#fff; letter-spacing:.3px}
</style>
</head>
<body>

  <!-- Launcher -->
  <div id="porthos-launcher" title="Hablar con Porthos" aria-label="Abrir chat"></div>

  <!-- Chat window -->
  <div id="porthos-chat" role="dialog" aria-label="Chat de soporte Porthos">
    <div class="pc-header">
      <div class="logo"></div>
      <div class="titles">
        <div class="t">Porthos</div>
        <div class="status"><span class="dot"></span> En línea</div>
      </div>
      <button class="pc-close" id="pc-close" aria-label="Cerrar">&times;</button>
    </div>
    <div class="pc-body" id="pc-body">
      <div class="typing" id="pc-typing"><span></span><span></span><span></span></div>
    </div>
    <div class="pc-input">
      <textarea id="pc-text" rows="1" placeholder="Escribe tu mensaje…"></textarea>
      <button class="pc-send" id="pc-send" aria-label="Enviar">&#10148;</button>
    </div>
    <div class="pc-foot">Estamos para ayudarte · Porthos Steakhouse &amp; Pub</div>
  </div>

<script>
(function(){
  const WEBHOOK = "https://the-turing-proyect-n8n.auk0rd.easypanel.host/webhook/porthos-web-chat/chat";

  const launcher = document.getElementById('porthos-launcher');
  const chat     = document.getElementById('porthos-chat');
  const body     = document.getElementById('pc-body');
  const typing   = document.getElementById('pc-typing');
  const input    = document.getElementById('pc-text');
  const sendBtn  = document.getElementById('pc-send');
  const closeBtn = document.getElementById('pc-close');

  // --- session persistence (returning visitor recognition) ---
  function uuid(){
    return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>
      (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c/4).toString(16));
  }
  let sessionId = localStorage.getItem('porthos_web_session');
  if(!sessionId){ sessionId = uuid(); localStorage.setItem('porthos_web_session', sessionId); }

  const HKEY = 'porthos_web_history';
  const LKEY = 'porthos_web_last';            // timestamp del ultimo mensaje
  const RESET_MS = 24 * 60 * 60 * 1000;       // 24 horas de inactividad

  let history = [];
  try { history = JSON.parse(localStorage.getItem(HKEY) || '[]'); } catch(e){ history = []; }

  // Tras 24h sin actividad: limpia la conversacion visible (el nombre se conserva en el servidor)
  const lastActivity = parseInt(localStorage.getItem(LKEY) || '0', 10);
  if (lastActivity && (Date.now() - lastActivity) > RESET_MS) {
    history = [];
    localStorage.removeItem(HKEY);
  }

  function saveHistory(){ localStorage.setItem(HKEY, JSON.stringify(history.slice(-50))); }
  function touch(){ localStorage.setItem(LKEY, String(Date.now())); }

  function addBubble(text, who){
    const el = document.createElement('div');
    el.className = 'msg ' + who;
    el.textContent = text;
    body.insertBefore(el, typing);
    body.scrollTop = body.scrollHeight;
    return el;
  }

  function renderHistory(){
    history.forEach(m => addBubble(m.text, m.who));
    if(history.length === 0){
      addBubble("¡Hola! 👋 Bienvenido a Porthos. Cuéntame, ¿en qué te puedo ayudar?", 'bot');
    }
  }
  renderHistory();

  function showTyping(s){ typing.classList.toggle('show', s); if(s) body.scrollTop = body.scrollHeight; }

  let busy = false;
  async function send(text){
    text = (text || '').trim();
    if(!text || busy) return;
    busy = true; sendBtn.disabled = true;
    addBubble(text, 'user');
    history.push({text, who:'user'}); saveHistory(); touch();
    input.value = ''; autoGrow();
    showTyping(true);
    try{
      const res = await fetch(WEBHOOK, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ action:'sendMessage', sessionId, chatInput:text })
      });
      const data = await res.json();
      const out = (data && (data.output ?? data.text ?? data.message)) || "Lo siento, no pude responder en este momento.";
      showTyping(false);
      addBubble(out, 'bot');
      history.push({text:out, who:'bot'}); saveHistory(); touch();
    }catch(err){
      showTyping(false);
      addBubble("Uy, tuve un problema de conexión. ¿Puedes intentarlo de nuevo en un momento?", 'bot');
    }finally{
      busy = false; sendBtn.disabled = false; input.focus();
    }
  }

  // --- open / close ---
  function openChat(){ chat.classList.add('open'); launcher.classList.add('open'); setTimeout(()=>input.focus(),200); }
  function closeChat(){ chat.classList.remove('open'); launcher.classList.remove('open'); }
  launcher.addEventListener('click', ()=> chat.classList.contains('open') ? closeChat() : openChat());
  closeBtn.addEventListener('click', closeChat);

  // --- input behavior ---
  function autoGrow(){ input.style.height='auto'; input.style.height = Math.min(input.scrollHeight,96)+'px'; }
  input.addEventListener('input', autoGrow);
  input.addEventListener('keydown', e=>{
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(input.value); }
  });
  sendBtn.addEventListener('click', ()=> send(input.value));
})();
</script>
</body>
</html>
